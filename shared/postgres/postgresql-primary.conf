# Koneksi Dasar
listen_addresses = '*'
port = 5432
max_connections = 200

# Pengaturan Replikasi (WAL - Write Ahead Logging)
wal_level = replica
max_wal_senders = 5
max_replication_slots = 5
wal_keep_size = 128MB
hot_standby = on

# Optimasi Performa Memori (Sesuai dengan Container)
shared_buffers = 128MB
effective_cache_size = 512MB
work_mem = 4MB
maintenance_work_mem = 32MB
checkpoint_completion_target = 0.9
wal_buffers = 4MB

# Sistem Logging
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 1000
log_checkpoints = on
log_lock_waits = on