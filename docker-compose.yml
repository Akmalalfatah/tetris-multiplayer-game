networks:
  tetris-network:
    driver: bridge

volumes:
  postgres-primary-data:
  postgres-replica-data:
  redis-data:
  pgadmin-data:

services:
  # ─── INFRASTRUCTURE ─────────────────────────────────────────────────────────

  postgres-primary:
    image: postgres:15-alpine
    container_name: tetris-postgres-primary
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ./shared/postgres/primary-init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./shared/postgres/postgresql-primary.conf:/etc/postgresql/postgresql.conf
    ports:
      - "5432:5432"
    networks:
      - tetris-network
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-replica:
    image: postgres:15-alpine
    container_name: tetris-postgres-replica
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGUSER: ${POSTGRES_REPLICATION_USER}
      PGPASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
      - ./shared/postgres/replica-setup.sh:/docker-entrypoint-initdb.d/setup-replica.sh
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - tetris-network
    ports:
      - "5433:5432"

  redis-primary:
    image: redis:7-alpine
    container_name: tetris-redis-primary
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - tetris-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-replica:
    image: redis:7-alpine
    container_name: tetris-redis-replica
    command: redis-server --replicaof redis-primary 6379 --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD}
    depends_on:
      - redis-primary
    ports:
      - "6380:6379"
    networks:
      - tetris-network

  # ─── LOAD BALANCER ──────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: tetris-nginx

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./game.html:/usr/share/nginx/html/index.html:ro

    depends_on:
      - api-gateway-1
      - api-gateway-2

    networks:
      - tetris-network

    restart: unless-stopped

  # ─── API GATEWAY (Active-Active for Fault Tolerance) ────────────────────────

  api-gateway-1:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: tetris-api-gateway-1
    environment:
      PORT: 3000
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-primary:6379
      LOGIN_SERVICE_URL: http://login-service:3001
      USER_SERVICE_URL: http://user-service:3002
      MATCHMAKING_SERVICE_URL: http://matchmaking-service:3003
      CHAT_SERVICE_URL: http://chat-service:3004
      RANKING_SERVICE_URL: http://ranking-service:3005
      GAME_SERVICE_URL: http://game-service:3006
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - tetris-network
    depends_on:
      - redis-primary

  api-gateway-2:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: tetris-api-gateway-2
    environment:
      PORT: 3000
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-primary:6379
      LOGIN_SERVICE_URL: http://login-service:3001
      USER_SERVICE_URL: http://user-service:3002
      MATCHMAKING_SERVICE_URL: http://matchmaking-service:3003
      CHAT_SERVICE_URL: http://chat-service:3004
      RANKING_SERVICE_URL: http://ranking-service:3005
      GAME_SERVICE_URL: http://game-service:3006
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - tetris-network
    depends_on:
      - redis-primary

  # ─── MICROSERVICES ───────────────────────────────────────────────────────────

  login-service:
    build:
      context: ./login-service
      dockerfile: Dockerfile
    container_name: tetris-login-service
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-primary:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-primary:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 24h
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 7d
    networks:
      - tetris-network
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-primary:
        condition: service_healthy
    restart: unless-stopped

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: tetris-user-service
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-primary:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-primary:6379
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - tetris-network
    depends_on:
      postgres-primary:
        condition: service_healthy
    restart: unless-stopped

  matchmaking-service:
    build:
      context: ./matchmaking-service
      dockerfile: Dockerfile
    container_name: tetris-matchmaking-service
    environment:
      PORT: 3003
      GRPC_PORT: 50051
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-primary:6379
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-primary:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      GAME_SERVICE_URL: http://game-service:3006
    networks:
      - tetris-network
    depends_on:
      - redis-primary
    restart: unless-stopped

  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    container_name: tetris-chat-service
    environment:
      PORT: 3004
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-primary:6379
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-primary:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - tetris-network
    depends_on:
      - redis-primary
      - postgres-primary
    restart: unless-stopped

  ranking-service:
    build:
      context: ./ranking-service
      dockerfile: Dockerfile
    container_name: tetris-ranking-service
    ports:
      - "3005:3005"
      
    environment:
      PORT: 3005
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-primary:6379
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-primary:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      CACHE_TTL: 60
    networks:
      - tetris-network
    depends_on:
      - redis-primary
      - postgres-primary
    restart: unless-stopped

  game-service:
    build:
      context: ./game-service
      dockerfile: Dockerfile
    container_name: tetris-game-service
    environment:
      PORT: 3006
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-primary:6379
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-primary:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      RANKING_SERVICE_URL: http://ranking-service:3005
    networks:
      - tetris-network
    depends_on:
      - redis-primary
      - postgres-primary
    restart: unless-stopped

  # ─── MONITORING ─────────────────────────────────────────────────────────────

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tetris-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    networks:
      - tetris-network
    volumes:
      - pgadmin-data:/var/lib/pgadmin
